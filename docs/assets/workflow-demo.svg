<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Emoji search workflow demo</title>
  <desc id="desc">A local-first workflow diagram for importing image folders, captioning with an OpenAI-compatible vision model, indexing vectors, manual review, and using Raycast or the web app.</desc>
  <defs>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .title { fill: #0f172a; font-size: 42px; font-weight: 850; }
      .sub { fill: #475569; font-size: 22px; }
      .boxTitle { fill: #0f172a; font-size: 26px; font-weight: 850; }
      .boxBody { fill: #475569; font-size: 18px; font-weight: 600; }
      .cmd { fill: #334155; font-size: 16px; font-family: ui-monospace, SFMono-Regular, Menlo, monospace; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#64748b" flood-opacity="0.2"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="9" markerHeight="9" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748b"/>
    </marker>
  </defs>
  <rect width="1440" height="900" fill="#f8fafc"/>
  <g class="ui">
    <text x="120" y="118" class="title">Local-first Emoji Search Workflow</text>
    <text x="120" y="158" class="sub">导入图片，生成 caption，构建索引，人工补标签，最后接 Raycast / Web UI。</text>

    <g filter="url(#shadow)">
      <rect x="120" y="230" width="270" height="170" rx="22" fill="#ffffff"/>
      <text x="150" y="282" class="boxTitle">1. Import</text>
      <text x="150" y="320" class="boxBody">任意图片文件夹</text>
      <text x="150" y="350" class="boxBody">或 QQ 收藏目录</text>
      <text x="150" y="380" class="cmd">emoji-import-folder</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="470" y="230" width="270" height="170" rx="22" fill="#ffffff"/>
      <text x="500" y="282" class="boxTitle">2. Caption</text>
      <text x="500" y="320" class="boxBody">OpenAI-compatible</text>
      <text x="500" y="350" class="boxBody">vision API</text>
      <text x="500" y="380" class="cmd">uv run emoji-search</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="820" y="230" width="270" height="170" rx="22" fill="#ffffff"/>
      <text x="850" y="282" class="boxTitle">3. Index</text>
      <text x="850" y="320" class="boxBody">字段级语义向量</text>
      <text x="850" y="350" class="boxBody">本地搜索文件</text>
      <text x="850" y="380" class="cmd">image_vectors.pkl</text>
    </g>
    <g filter="url(#shadow)">
      <rect x="1170" y="230" width="150" height="170" rx="22" fill="#ffffff"/>
      <text x="1200" y="282" class="boxTitle">4. Use</text>
      <text x="1200" y="320" class="boxBody">Raycast</text>
      <text x="1200" y="350" class="boxBody">Web UI</text>
      <text x="1200" y="380" class="boxBody">CSV</text>
    </g>

    <line x1="390" y1="315" x2="470" y2="315" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="740" y1="315" x2="820" y2="315" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>
    <line x1="1090" y1="315" x2="1170" y2="315" stroke="#64748b" stroke-width="4" marker-end="url(#arrow)"/>

    <g filter="url(#shadow)">
      <rect x="190" y="530" width="1060" height="200" rx="28" fill="#0f172a"/>
      <text x="232" y="588" fill="#e5e7eb" font-size="30" font-weight="850">Local-only boundary</text>
      <text x="232" y="634" fill="#cbd5e1" font-size="22" font-weight="650">进入 Git：代码、CLI、Raycast 扩展、文档、示例图</text>
      <text x="232" y="674" fill="#cbd5e1" font-size="22" font-weight="650">留在本机：图片、caption、向量索引、人工 CSV、.env</text>
      <rect x="952" y="572" width="220" height="72" rx="18" fill="#dcfce7"/>
      <text x="1000" y="617" fill="#166534" font-size="24" font-weight="850">可公开推广</text>
    </g>
  </g>
</svg>
