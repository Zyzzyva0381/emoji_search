<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" viewBox="0 0 1440 900" role="img" aria-labelledby="title desc">
  <title id="title">Human editable catalog demo</title>
  <desc id="desc">A mock CSV catalog showing machine-generated sticker fields alongside editable manual tags and WeChat keywords.</desc>
  <defs>
    <style>
      .ui { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .head { fill: #0f172a; font-size: 30px; font-weight: 800; }
      .sub { fill: #64748b; font-size: 20px; }
      .th { fill: #334155; font-size: 18px; font-weight: 800; }
      .td { fill: #1f2937; font-size: 18px; font-weight: 600; }
      .muted { fill: #64748b; font-size: 17px; }
    </style>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#64748b" flood-opacity="0.25"/>
    </filter>
  </defs>
  <rect width="1440" height="900" fill="#f8fafc"/>
  <g class="ui" filter="url(#shadow)">
    <rect x="80" y="72" width="1280" height="760" rx="24" fill="#ffffff"/>
    <text x="120" y="138" class="head">emoji_catalog.csv 人工校对视图</text>
    <text x="120" y="176" class="sub">机器字段负责检索，人工列补充私有梗、外号、微信含义词</text>
    <rect x="120" y="220" width="1200" height="540" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2"/>
    <rect x="120" y="220" width="1200" height="58" rx="14" fill="#e2e8f0"/>
    <rect x="120" y="260" width="1200" height="18" fill="#e2e8f0"/>

    <g transform="translate(142 256)">
      <text x="0" y="0" class="th">path</text>
      <text x="220" y="0" class="th">wechat_keyword</text>
      <text x="430" y="0" class="th">manual_tags</text>
      <text x="700" y="0" class="th">usage_context</text>
      <text x="1010" y="0" class="th">character</text>
    </g>

    <g transform="translate(120 278)">
      <g>
        <rect x="0" y="0" width="1200" height="78" fill="#ffffff"/>
        <line x1="0" y1="78" x2="1200" y2="78" stroke="#e5e7eb"/>
        <text x="22" y="48" class="muted">images/demo_001.png</text>
        <text x="242" y="48" class="td">摆烂</text>
        <rect x="452" y="20" width="182" height="38" rx="10" fill="#fef3c7"/>
        <text x="470" y="46" class="td">摸鱼; 周一; 躺平</text>
        <text x="722" y="48" class="td">表达放弃挣扎或轻松自嘲</text>
        <text x="1032" y="48" class="td">卡通青蛙</text>
      </g>
      <g transform="translate(0 78)">
        <rect x="0" y="0" width="1200" height="78" fill="#f8fafc"/>
        <line x1="0" y1="78" x2="1200" y2="78" stroke="#e5e7eb"/>
        <text x="22" y="48" class="muted">images/demo_002.png</text>
        <text x="242" y="48" class="td">收到</text>
        <rect x="452" y="20" width="152" height="38" rx="10" fill="#dcfce7"/>
        <text x="470" y="46" class="td">已读; 没问题</text>
        <text x="722" y="48" class="td">回复消息已阅、表示同意</text>
        <text x="1032" y="48" class="td">文字贴纸</text>
      </g>
      <g transform="translate(0 156)">
        <rect x="0" y="0" width="1200" height="78" fill="#ffffff"/>
        <line x1="0" y1="78" x2="1200" y2="78" stroke="#e5e7eb"/>
        <text x="22" y="48" class="muted">images/demo_003.png</text>
        <text x="242" y="48" class="td">无语</text>
        <rect x="452" y="20" width="178" height="38" rx="10" fill="#e0f2fe"/>
        <text x="470" y="46" class="td">吐槽; 沉默; 尴尬</text>
        <text x="722" y="48" class="td">对离谱发言无言以对</text>
        <text x="1032" y="48" class="td">圆脸角色</text>
      </g>
      <g transform="translate(0 234)">
        <rect x="0" y="0" width="1200" height="78" fill="#f8fafc"/>
        <line x1="0" y1="78" x2="1200" y2="78" stroke="#e5e7eb"/>
        <text x="22" y="48" class="muted">images/demo_004.png</text>
        <text x="242" y="48" class="td">起飞</text>
        <rect x="452" y="20" width="154" height="38" rx="10" fill="#fee2e2"/>
        <text x="470" y="46" class="td">冲刺; 开干</text>
        <text x="722" y="48" class="td">表示马上开始行动</text>
        <text x="1032" y="48" class="td">飞行物</text>
      </g>
      <g transform="translate(0 312)">
        <rect x="0" y="0" width="1200" height="78" fill="#ffffff"/>
        <line x1="0" y1="78" x2="1200" y2="78" stroke="#e5e7eb"/>
        <text x="22" y="48" class="muted">images/demo_005.png</text>
        <text x="242" y="48" class="td">点赞</text>
        <rect x="452" y="20" width="148" height="38" rx="10" fill="#ede9fe"/>
        <text x="470" y="46" class="td">赞同; 认可</text>
        <text x="722" y="48" class="td">表示支持、没问题</text>
        <text x="1032" y="48" class="td">小猫</text>
      </g>
      <g transform="translate(0 390)">
        <rect x="0" y="0" width="1200" height="78" fill="#f8fafc"/>
        <line x1="0" y1="78" x2="1200" y2="78" stroke="#e5e7eb"/>
        <text x="22" y="48" class="muted">images/demo_006.png</text>
        <text x="242" y="48" class="td">催更</text>
        <rect x="452" y="20" width="180" height="38" rx="10" fill="#fef3c7"/>
        <text x="470" y="46" class="td">等更新; 快一点</text>
        <text x="722" y="48" class="td">催对方交付或回复</text>
        <text x="1032" y="48" class="td">文字贴纸</text>
      </g>
    </g>
    <text x="120" y="810" class="sub">编辑 CSV 后运行 catalog apply，再重建向量索引，人工标签就会进入搜索。</text>
  </g>
</svg>
